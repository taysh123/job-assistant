# Job Assistant preferences — annotated template.
# Copy to config/config.yaml and edit. Secrets (Telegram token/chat id) go in
# environment variables / GitHub Actions secrets, NOT here.
#
# Defaults below are tuned for a GRADUATE / JUNIOR software job search in
# ISRAEL (center-weighted), open to remote / hybrid / on-site, no relocation.
# Adjust freely for your own profile.

sources:
  remotive:
    enabled: true
    # Remotive's public API returns a single general feed — the category param
    # is effectively ignored, so adding categories does not broaden results.
    categories: ["software-dev"]
    search: ""        # optional free-text query
    limit: 100

  weworkremotely:
    enabled: true
    # RSS feed slugs from https://weworkremotely.com/categories (these DO differ).
    feeds:
      - "remote-programming-jobs"
      - "remote-full-stack-programming-jobs"
      - "remote-back-end-programming-jobs"
      - "remote-front-end-programming-jobs"

  # Per-company public job boards — the reliable way to get ISRAEL-based roles
  # (remote sources above are worldwide). Add or remove company slugs anytime;
  # an unknown/stale slug is skipped safely (logged, never fatal).
  greenhouse:
    enabled: true
    # Slug = the token in https://boards.greenhouse.io/<slug>. The list below is
    # a verified starter set of Israeli tech companies — extend it with your own
    # targets (check the company's careers page for a Greenhouse board).
    boards:
      - "via"
      - "catonetworks"
      - "jfrog"
      - "payoneer"
      - "similarweb"
      - "taboola"
      - "fireblocks"
      - "forter"
      - "axonius"
      - "riskified"
      - "transmitsecurity"
      - "yotpo"
      - "augury"
      - "melio"
      - "orcasecurity"
      - "saltsecurity"
      - "lightricks"
      - "bigid"
      - "pagaya"
      - "bringg"
      - "cybereason"
      - "nice"
      - "appsflyer"

  lever:
    enabled: true
    # Slug = https://jobs.lever.co/<slug>
    boards:
      - "logz"

  # Jobicy remote-jobs aggregator (public API, no key). geo "israel" returns
  # EMEA/Anywhere remote roles open to an Israel-based applicant; industry
  # "engineering" narrows to dev.
  jobicy:
    enabled: false
    geo: "israel"
    industry: "engineering"
    count: 50

  # Comeet ATS — widely used by Israeli companies. Public Careers API; opt-in.
  # Find each company's uid + token on the Comeet side under
  # Settings -> Careers Website -> Careers API, then add an entry per company.
  # A wrong/stale uid or token is skipped safely (logged, never fatal).
  comeet:
    enabled: false
    companies: []
      # - { name: "Example Co", uid: "30.005", token: "YOUR_TOKEN" }

  # LinkedIn coverage via Job-Alert EMAIL ingestion — NO scraping or login.
  # How it works: you create Job Alerts on LinkedIn → LinkedIn emails you matching
  # jobs → this source reads your inbox over IMAP and parses them.
  # To enable: set IMAP_USERNAME / IMAP_PASSWORD secrets (Gmail needs an App
  # Password), then enabled: true. Skipped automatically if creds are missing.
  linkedin:
    enabled: false
    imap_host: "imap.gmail.com"   # your mail provider's IMAP host
    imap_folder: "INBOX"          # folder/label the alerts land in
    senders:                       # only read mail from these LinkedIn addresses
      - "jobalerts-noreply@linkedin.com"
      - "jobs-noreply@linkedin.com"
    max_age_days: 3                # only consider alerts from the last N days
    mark_seen: false               # mark processed alert emails as read
    limit: 50                      # max emails to scan per sender

filters:
  # A job is kept if it matches >= min_match_score allow terms (title/summary),
  # has no deny term, and passes the remote/location/seniority gates.

  # Broad set of junior-suitable software roles.
  # Engineering-focused: pure analyst / data-scientist titles removed (Data Engineer
  # + Machine Learning engineer roles still pass; broad "engineer"/"developer" cover
  # AI/ML engineer titles).
  titles_allow:
    ["engineer", "developer", "programmer", "software", "full stack", "fullstack",
     "full-stack", "front end", "frontend", "front-end", "back end", "backend",
     "back-end", "web", "mobile", "android", "ios", "qa", "automation", "test",
     "devops", "data engineer", "machine learning"]

  # Junior/grad terms + core entry-level tech.
  keywords_allow:
    ["junior", "graduate", "entry level", "entry-level", "new grad", "student",
     "python", "java", "javascript", "typescript", "react", "node", "c#", "sql",
     "html", "css"]

  # Topic exclusions (kept empty for openness). e.g. ["crypto", "unpaid"]
  keywords_deny: []

  # any | remote_only | onsite_only
  remote: "any"

  # HARD geographic ALLOW filter for on-site jobs (remote always passes). Empty =
  # no allow filter: every Israeli location (Haifa, Jerusalem, Beer Sheva, North,
  # ...) and remote stay eligible; center is prioritized by ranking, not filtering.
  # Prefer leaving this empty — an allow-list risks dropping valid Israeli towns it
  # forgets to list (e.g. a job tagged only "TLV").
  locations_allow: []

  # Removes roles abroad for an Israel-wide + remote search. Applies to on-site
  # roles, and to "remote" roles whose location pins them to a denied region
  # (region-restricted hiring) — a remote location containing anywhere/worldwide/
  # global/remote always stays. Never list Israeli locations here.
  locations_deny:
    ["india", "bangalore", "bengaluru", "gurugram", "gurgaon", "hyderabad", "pune",
     "mumbai", "delhi", "noida", "china", "beijing", "shanghai", "guangzhou",
     "shenzhen", "hong kong", "japan", "tokyo", "singapore", "hungary", "budapest",
     "bulgaria", "sofia", "czech", "prague", "poland", "warsaw", "krakow", "romania",
     "bucharest", "ukraine", "kyiv", "kiev", "portugal", "lisbon", "porto", "spain",
     "madrid", "barcelona", "germany", "berlin", "munich", "france", "paris",
     "united kingdom", "london", "england", "manchester", "ireland", "dublin",
     "netherlands", "amsterdam", "united states", "usa", "new york",
     "san francisco", "austin", "boston", "seattle", "canada", "toronto",
     "vancouver", "brazil", "sao paulo", "mexico", "argentina", "buenos aires",
     "colombia", "bogota", "australia", "sydney", "melbourne", "philippines",
     "manila", "cebu", "uae", "dubai", "abu dhabi", "turkey", "istanbul",
     "egypt", "cairo", "vietnam", "thailand", "bangkok", "indonesia", "jakarta",
     "south africa"]

  # Leave empty: a title-based allow gate would drop generic "Software Engineer"
  # roles that may be junior. e.g. ["junior", "graduate"]
  seniority_allow: []

  # Drop clearly-senior titles (matched against the title). Keeps the search
  # realistic for a new grad — including for AI/ML roles — without topic blocks.
  seniority_deny:
    ["senior", "sr.", "staff", "principal", "lead", "head of", "vice president",
     "director", "manager", "architect", "expert", "experienced", "5+ years",
     "6+ years", "7+ years", "8+ years", "9+ years", "10+ years",
     "research scientist", "phd", "fellow", " ii", " iii", " iv"]

  # Title-only exclusion of role TYPES that share a software word but aren't a
  # software-developer first job (sales/support/solutions "engineer", recruiter,
  # account/HR/marketing). Matched on the title only, so a dev role that merely
  # mentions the word in its summary stays. (Manager/director titles are already
  # handled by seniority_deny.) Edit freely for your own profile.
  # titles_allow includes the broad term "engineer", so ANY "X Engineer" passes the
  # gate; these title-only deny terms remove the non-software / non-junior "engineer"
  # roles (electrical, mechanical, GxP/lab, site-reliability/ops) plus sales/support/
  # HR. Junior DevOps, QA Automation and junior AI/ML stay eligible.
  titles_deny:
    ["sales", "support engineer", "solutions engineer", "solution engineer",
     "presales", "pre-sales", "implementation", "customer engineer",
     "customer success", "account manager", "account executive", "recruit",
     "talent acquisition", "human resources", "marketing",
     "business development", "professional services", "field engineer",
     "helpdesk", "help desk", "service desk", "it support", "support specialist",
     "technical support",
     "electrical", "mechanical", "instrument", "instrumentation", "hardware",
     "civil", "chemical", "biomedical", "industrial", "manufacturing",
     "mechatronic", "aerospace", "automotive", "rf engineer", "optical",
     "process engineer", "gxp", "validation engineer",
     "site reliability", "sre",
     # Non-engineering roles (analyst/scientist/designer/pre-sales/founding/admin):
     "analyst", "scientist", "researcher", "research engineer", "designer",
     "application engineer", "founding", "office assistant", "administrative",
     "receptionist", "community", "website admin", "web admin",
     # IT-ops / advocacy roles observed in real collected data.
     "it specialist", "developer advocate", "noc engineer"]

  min_match_score: 1

  # Experience handling (junior-friendly). Acted on ONLY when a role explicitly
  # requires more than max_years_experience (e.g. "5+ years", "senior-level");
  # roles with no stated years are never affected.
  #   experience_mode: downrank (penalise, keep visible) | filter (exclude) | off
  # "filter" suits a no-experience first-job search (default here); switch to
  # "downrank" to keep over-experienced roles visible at the bottom instead.
  max_years_experience: 2
  experience_mode: "filter"
  experience_penalty: 8         # score penalty used in downrank mode

  # LOCATION ranking only (does not gate): center Israel > rest of Israel >
  # remote/other. "israel" lifts every Israeli role; center cities give Tel Aviv /
  # Gush Dan / Central District an extra edge.
  boost_keywords:
    ["israel",
     "tel aviv", "tel-aviv", "tel aviv-yafo", "tel aviv district", "gush dan",
     "ramat gan", "givatayim", "bnei brak", "holon", "bat yam", "herzliya",
     "petah tikva", "petach tikva", "ra'anana", "raanana", "kfar saba",
     "hod hasharon", "rosh haayin", "or yehuda", "rishon lezion", "rishon",
     "rehovot", "ness ziona", "nes ziona", "netanya", "central district", "merkaz"]
  boost_weight: 3

  # JUNIOR ranking (title only): a dedicated, heavier boost so explicit entry-level
  # roles sort to the very top — above same-tech non-junior roles, even Tel-Aviv
  # ones. Weight > (israel + one center city) so a remote junior role still wins.
  junior_boost_keywords:
    ["junior", "graduate", "entry level", "entry-level", "new grad", "new-grad",
     "student", "intern", "trainee", "associate"]
  junior_boost_weight: 8

digest:
  max_jobs: 25                # cap jobs per run (highest-ranked first)
  summary_chars: 280          # truncate posting summary to this length
  timezone: "Asia/Jerusalem"
  page_size: 1                # jobs per page (1 = one card at a time, Prev/Next to browse)
  notify_empty: false         # false = stay silent on empty runs (no "no new jobs" spam)
