name: Weekly summary

on:
  # Scheduled runs are DISABLED — the always-on `serve` process sends the weekly
  # summary on Mondays (see DEPLOY.md). Kept as a manual fallback via "Run workflow".
  # schedule:
  #   - cron: "0 8 * * 1"   # Mondays 08:00 UTC
  workflow_dispatch: {}

concurrency:
  group: job-assistant-db
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Send weekly summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m job_assistant.cli weekly
      - name: Commit database
        run: |
          bash .github/scripts/commit-db.sh "chore(data): weekly summary"
