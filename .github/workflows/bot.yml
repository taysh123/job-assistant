name: Process bot updates

on:
  # Scheduled runs are DISABLED — the always-on `serve` process handles Telegram
  # live (see DEPLOY.md). Kept as a manual fallback via "Run workflow".
  # WARNING: do NOT re-enable this while `serve` runs — Telegram allows only one
  # getUpdates consumer (the overlap yields a harmless 409). Uncomment to restore
  # cron mode only if you are NOT running serve.
  # schedule:
  #   - cron: "*/20 * * * *"   # every 20 min
  workflow_dispatch: {}

concurrency:
  group: job-assistant-db
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Handle commands and button presses
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m job_assistant.cli process-updates
      - name: Commit database
        run: |
          bash .github/scripts/commit-db.sh "chore(data): bot updates"
