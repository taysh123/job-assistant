name: Process bot updates

on:
  schedule:
    # Every 20 min (~1440 GHA minutes/month, within the free private-repo budget).
    # Lower the interval if your repo is public (unlimited minutes).
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

concurrency:
  group: job-assistant-db
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Handle commands and button presses
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m job_assistant.cli process-updates
      - name: Commit database
        run: |
          bash .github/scripts/commit-db.sh "chore(data): bot updates"
