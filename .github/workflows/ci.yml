name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"   # don't re-run tests on automated DB commits
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest
